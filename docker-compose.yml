services:
  postgres:
    image: postgres:16-alpine
    container_name: humanlogs2026-postgres
    environment:
      POSTGRES_DB: humanlogs2026
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - humanlogs2026-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d humanlogs2026"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  humanlogs2026-postgres:
